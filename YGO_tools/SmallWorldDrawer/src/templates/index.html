<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmallWorldDrawer - 小世界树绘制</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1923;
            color: #e0e0e0;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #1a2a3a, #0d1b2a);
            padding: 20px 40px;
            border-bottom: 2px solid #c9a84c;
        }
        .header h1 { font-size: 24px; color: #c9a84c; letter-spacing: 2px; }
        .header p { color: #8899aa; font-size: 14px; margin-top: 4px; }
        .container { max-width: 1500px; margin: 0 auto; padding: 20px; }

        /* ── 选择区 ── */
        .deck-section {
            background: #1a2a3a;
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 16px;
            border: 1px solid #2a3a4a;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .deck-section h2 { color: #c9a84c; font-size: 15px; white-space: nowrap; }

        .deck-select {
            flex: 1;
            min-width: 180px;
            padding: 8px 12px;
            background: #243447;
            color: #e0e0e0;
            border: 1px solid #354a5e;
            border-radius: 6px;
            font-size: 13px;
            outline: none;
            cursor: pointer;
        }
        .deck-select:focus { border-color: #c9a84c; }
        .deck-select option { background: #1a2a3a; }

        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .btn-gold { background: #c9a84c; color: #0f1923; }
        .btn-gold:hover { background: #dab95c; }
        .btn-gold:disabled { background: #4a5a6a; color: #8899aa; cursor: not-allowed; }
        .btn-blue { background: #2980b9; color: #fff; }
        .btn-blue:hover { background: #3498db; }
        .btn-blue:disabled { background: #4a5a6a; color: #8899aa; cursor: not-allowed; }
        .btn-green { background: #27ae60; color: #fff; }
        .btn-green:hover { background: #2ecc71; }
        .btn-green:disabled { background: #4a5a6a; color: #8899aa; cursor: not-allowed; }
        .btn-red { background: #c0392b; color: #fff; }
        .btn-red:hover { background: #e74c3c; }
        .btn-sm { padding: 4px 10px; font-size: 11px; }

        .status {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            display: none;
            white-space: nowrap;
        }
        .status.loading { display: inline-block; background: #1a2a3a; border: 1px solid #c9a84c; color: #c9a84c; }
        .status.success { display: inline-block; background: #0a2a1a; border: 1px solid #4caf50; color: #4caf50; }
        .status.error { display: inline-block; background: #2a0a0a; border: 1px solid #f44336; color: #f44336; }

        /* ── 标签页 ── */
        .tabs {
            display: flex;
            gap: 0;
            margin-bottom: 16px;
            border-bottom: 2px solid #2a3a4a;
        }
        .tab {
            padding: 10px 24px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            color: #8899aa;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s;
        }
        .tab:hover { color: #c9a84c; }
        .tab.active { color: #c9a84c; border-bottom-color: #c9a84c; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* ── 统计栏 ── */
        .stat-bar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .stat-item {
            background: #1a2a3a;
            padding: 8px 14px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #2a3a4a;
        }
        .stat-item .num { font-size: 18px; font-weight: 700; color: #c9a84c; }
        .stat-item .label { font-size: 10px; color: #8899aa; margin-top: 2px; }

        /* ── 卡组编辑 ── */
        .editor-toolbar {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }
        .editor-toolbar .info { color: #667788; font-size: 12px; }

        .deck-columns {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 14px;
            margin-bottom: 20px;
        }
        .deck-col {
            background: #1a2a3a;
            border-radius: 10px;
            border: 1px solid #2a3a4a;
            padding: 12px;
            min-height: 200px;
        }
        .deck-col-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid #2a3a4a;
        }
        .deck-col-header h3 { font-size: 14px; color: #c9a84c; }
        .deck-col-header .count { font-size: 12px; color: #667788; }
        .deck-col-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #667788;
            font-size: 20px;
            user-select: none;
        }
        .deck-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
            gap: 6px;
            max-height: 600px;
            overflow-y: auto;
        }
        .deck-cards::-webkit-scrollbar { width: 4px; }
        .deck-cards::-webkit-scrollbar-track { background: #1a2a3a; }
        .deck-cards::-webkit-scrollbar-thumb { background: #3a4a5a; border-radius: 2px; }

        .deck-card {
            background: #243447;
            border-radius: 6px;
            padding: 4px;
            text-align: center;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.15s;
            position: relative;
        }
        .deck-card.main-card { border-color: #2a3a4a; }
        .deck-card.side-card { border-color: #2a3a4a; }
        .deck-card.extra-card { border-color: #2a3a4a; }
        .deck-card:hover {
            border-color: #c9a84c;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(201,168,76,0.2);
        }
        .deck-card img {
            width: 100%;
            aspect-ratio: 177/254;
            object-fit: cover;
            border-radius: 3px;
            background: #0f1923;
        }
        .deck-card .card-name {
            font-size: 9px;
            color: #bbb;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-top: 2px;
            line-height: 1.2;
        }
        .deck-card .card-level {
            position: absolute;
            top: 4px; right: 4px;
            background: rgba(0,0,0,0.7);
            color: #c9a84c;
            font-size: 8px;
            padding: 1px 4px;
            border-radius: 3px;
            font-weight: 600;
        }
        .deck-card .extra-badge {
            position: absolute;
            top: 4px; left: 4px;
            background: rgba(231,76,60,0.85);
            color: #fff;
            font-size: 7px;
            padding: 1px 4px;
            border-radius: 3px;
            font-weight: 700;
        }
        .deck-card.dragging {
            opacity: 0.4;
        }
        .deck-col.drag-over {
            border-color: #c9a84c;
            background: rgba(201,168,76,0.08);
        }
        .deck-col.drag-over .deck-cards {
            min-height: 80px;
        }

        /* ── 排序信息 ── */
        .sort-info {
            font-size: 11px;
            color: #667788;
            margin-bottom: 10px;
            padding: 0 4px;
        }

        /* ── 怪兽网格 ── */
        .monster-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 8px;
        }
        .monster-card {
            background: #1a2a3a;
            border-radius: 8px;
            padding: 5px;
            text-align: center;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .monster-card:hover {
            border-color: #c9a84c;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(201,168,76,0.25);
        }
        .monster-card img {
            width: 100%;
            aspect-ratio: 177/254;
            object-fit: cover;
            border-radius: 4px;
            background: #0f1923;
        }
        .monster-card .info {
            font-size: 10px;
            margin-top: 3px;
            color: #ccc;
            line-height: 1.2;
        }
        .monster-card .info .name {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .monster-card .info .stats {
            color: #8899aa;
            font-size: 9px;
        }
        .monster-card .badge {
            position: absolute;
            top: 6px; right: 6px;
            background: rgba(0,0,0,0.7);
            color: #c9a84c;
            font-size: 9px;
            padding: 2px 5px;
            border-radius: 4px;
            font-weight: 600;
        }
        /* ── 模态框 ── */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.visible { display: flex; }
        .modal-content {
            background: #0f1923;
            border: 1px solid #c9a84c;
            border-radius: 12px;
            padding: 20px;
            max-width: 90vw;
            max-height: 90vh;
            position: relative;
        }
        .modal-content img {
            max-width: 80vw;
            max-height: 80vh;
            display: block;
            border-radius: 8px;
        }
        .modal-close {
            position: absolute;
            top: -12px; right: -12px;
            width: 32px; height: 32px;
            background: #c9a84c;
            color: #0f1923;
            border: none;
            border-radius: 50%;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-close:hover { background: #dab95c; }
        .modal-title {
            text-align: center;
            color: #c9a84c;
            font-size: 16px;
            margin-bottom: 12px;
        }
        .modal-loading {
            color: #8899aa;
            text-align: center;
            padding: 40px;
        }

        /* ── Toast 通知 ── */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .toast.visible { opacity: 1; }
        .toast.success { background: #27ae60; color: #fff; }
        .toast.error { background: #c0392b; color: #fff; }
        .toast.warning { background: #e67e22; color: #fff; }
    </style>
</head>
<body>
    <div class="header">
        <h1>SmallWorldDrawer</h1>
        <p>小世界树绘制 — 卡组分析与可视化工具</p>
    </div>
    <div class="container">

        <!-- 选择区 -->
        <div class="deck-section">
            <h2>选择卡组</h2>
            <select class="deck-select" id="deckSelect" onchange="onDeckChange()">
                <option value="">-- 请选择卡组 --</option>
            </select>
            <button class="btn btn-gold" id="btnLoad" onclick="loadDeck()" disabled>
                读取卡组
            </button>
            <div id="status" class="status"></div>
        </div>

        <!-- 标签页 -->
        <div class="tabs" id="tabBar" style="display:none;">
            <div class="tab active" data-tab="editor" onclick="switchTab('editor')">📋 卡组编辑</div>
            <div class="tab" data-tab="analysis" onclick="switchTab('analysis')">🔍 关系分析</div>
        </div>

        <!-- ── 卡组编辑 Tab ── -->
        <div class="tab-content active" id="tabEditor">
            <div class="editor-toolbar" id="editorToolbar" style="display:none;">
                <span class="info" id="deckNameInfo"></span>
                <button class="btn btn-blue btn-sm" id="btnReanalyze" onclick="reanalyze()">保存修改后重新分析</button>
            </div>

            <div class="deck-columns" id="deckEditor" style="display:none;">
                <!-- 主卡组（拖放目标：从副卡组拖入） -->
                <div class="deck-col" id="colMain" ondragover="onDragOver(event)" ondrop="onDrop(event, 'main')" ondragleave="onDragLeave(event)">
                    <div class="deck-col-header">
                        <h3> 主卡组（拖拽卡图放入副卡组）</h3>
                        <span class="count" id="mainCount">0 张</span>
                    </div>
                    <div class="deck-cards" id="mainDeckCards"></div>
                </div>

                <div class="deck-col-divider">⇄</div>

                <!-- 副卡组（拖放目标：从主卡组拖入） -->
                <div class="deck-col" id="colSide" ondragover="onDragOver(event)" ondrop="onDrop(event, 'side')" ondragleave="onDragLeave(event)">
                    <div class="deck-col-header">
                        <h3> 副卡组（拖拽卡图放入主卡组）</h3>
                        <span class="count" id="sideCount">0 张</span>
                    </div>
                    <div class="deck-cards" id="sideDeckCards"></div>
                </div>
            </div>

            <!-- 额外卡组（独立一行） -->
            <div class="deck-col" id="colExtra" style="display:none; margin-top: 8px;">
                <div class="deck-col-header">
                    <h3> 额外卡组</h3>
                    <span class="count" id="extraCount">0 张</span>
                </div>
                <div class="deck-cards" id="extraDeckCards"></div>
            </div>

            <!-- 操作提示 -->
            <div id="editorHint" style="display:none; color: #667788; font-size: 12px; text-align: center; padding: 10px;">
                💡 将卡牌拖拽到左侧（主卡组）或右侧（副卡组）区域来移动
            </div>
        </div>

        <!-- ── 关系分析 Tab ── -->
        <div class="tab-content" id="tabAnalysis">
            <!-- 统计栏 -->
            <div class="stat-bar" id="statBar" style="display:none;"></div>

            <!-- 怪兽列表 -->
            <div id="resultSection" style="display:none;">
                <div class="sort-info">仅显示主卡组怪兽 · 按星级↓ · 攻击力↓ · 防守力↓ 排序 · 点击怪兽查看检索关系图</div>
                <div class="monster-grid" id="monsterGrid"></div>
            </div>
            <div id="noMonsters" style="display:none; color: #667788; text-align: center; padding: 60px 20px;">
                主卡组中没有怪兽卡，请先在「卡组编辑」中调整卡组。
            </div>
        </div>

    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- 模态框 -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <div class="modal-title" id="modalTitle">加载中...</div>
            <div id="modalBody" class="modal-loading">正在生成检索关系图...</div>
        </div>
    </div>

    <script>
        let currentDeck = null;
        let deckLoaded = false;

        // ── Toast ──
        function showToast(msg, type='success') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast ' + type + ' visible';
            setTimeout(() => t.classList.remove('visible'), 3000);
        }

        // ── 标签页切换 ──
        function switchTab(name) {
            document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.toggle('active', t.id === 'tab' + name.charAt(0).toUpperCase() + name.slice(1)));
        }

        // ── 加载卡组列表 ──
        async function loadDecks() {
            const sel = document.getElementById('deckSelect');
            sel.innerHTML = '<option value="">-- 请选择卡组 --</option>';
            try {
                const resp = await fetch('/api/decks');
                const data = await resp.json();
                if (data.error) {
                    sel.innerHTML += '<option disabled>' + data.error + '</option>';
                    return;
                }
                data.decks.forEach(deck => {
                    const opt = document.createElement('option');
                    opt.value = deck.file;
                    opt.textContent = deck.name + ' (' + deck.count + ' 张)';
                    sel.appendChild(opt);
                });
            } catch(e) {
                sel.innerHTML += '<option disabled>无法连接服务器</option>';
            }
        }

        function onDeckChange() {
            const sel = document.getElementById('deckSelect');
            currentDeck = sel.value || null;
            document.getElementById('btnLoad').disabled = !currentDeck;
        }

        // ── 读取卡组 ──
        async function loadDeck() {
            if (!currentDeck) return;
            const status = document.getElementById('status');
            const btn = document.getElementById('btnLoad');
            btn.disabled = true;
            status.className = 'status loading';
            status.textContent = '正在读取卡组...';

            try {
                const resp = await fetch('/api/load-deck', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ deck_file: currentDeck })
                });
                const data = await resp.json();
                if (data.error) {
                    status.className = 'status error';
                    status.textContent = data.error;
                    btn.disabled = false;
                    return;
                }
                status.className = 'status success';
                status.textContent = '读取完成！' + data.total + ' 张卡牌';

                // 显示标签页和编辑器
                document.getElementById('tabBar').style.display = 'flex';
                switchTab('editor');
                deckLoaded = true;
                btn.disabled = false;

                // 加载卡组详情
                await loadDeckDetail();

                // 自动执行首次分析
                await reanalyze();

            } catch(e) {
                status.className = 'status error';
                status.textContent = '请求失败: ' + e.message;
                btn.disabled = false;
            }
        }

        // ── 加载卡组详情（编辑器用） ──
        async function loadDeckDetail() {
            try {
                const resp = await fetch('/api/deck-detail');
                const data = await resp.json();
                if (data.error) {
                    showToast(data.error, 'error');
                    return;
                }

                document.getElementById('deckNameInfo').textContent = '📄 ' + (data.deck_file || '未知');
                document.getElementById('editorToolbar').style.display = 'flex';
                document.getElementById('deckEditor').style.display = 'grid';
                document.getElementById('colExtra').style.display = 'block';
                document.getElementById('editorHint').style.display = 'block';

                renderDeckColumn('mainDeckCards', data.main_deck, 'main');
                renderDeckColumn('sideDeckCards', data.side_deck, 'side');
                renderDeckColumn('extraDeckCards', data.extra_deck, 'extra');

                document.getElementById('mainCount').textContent = data.main_deck.length + ' 张';
                document.getElementById('sideCount').textContent = data.side_deck.length + ' 张';
                document.getElementById('extraCount').textContent = data.extra_deck.length + ' 张';

            } catch(e) {
                showToast('加载卡组详情失败: ' + e.message, 'error');
            }
        }

        // ── 渲染卡组列 ──
        function renderDeckColumn(containerId, cards, section) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            cards.forEach(c => {
                const div = document.createElement('div');
                div.className = 'deck-card ' + section + '-card';
                const imgSrc = c.has_pic ? '/api/tmpimg/' + c.id + '.jpg' : '/api/placeholder';
                let badgeHtml = '';
                if (c.is_extra_monster) {
                    badgeHtml = '<div class="extra-badge">EX</div>';
                } else if (c.is_monster && c.level) {
                    badgeHtml = '<div class="card-level">Lv' + c.level + '</div>';
                }

                div.innerHTML = `
                    <img src="${imgSrc}" alt="${c.name}" loading="lazy">
                    ${badgeHtml}
                    <div class="card-name">${c.name}</div>
                `;

                // 主卡组和副卡组的卡牌可拖拽，额外卡组不可拖拽
                if (section === 'main' || section === 'side') {
                    div.draggable = true;
                    div.dataset.cardId = c.id;
                    div.dataset.section = section;
                    div.addEventListener('dragstart', onDragStart);
                    div.style.cursor = 'grab';
                }
                container.appendChild(div);
            });
        }

        // ── 拖拽事件 ──
        let dragData = null;

        function onDragStart(e) {
            const card = e.target.closest('.deck-card');
            if (!card) return;
            dragData = {
                cardId: parseInt(card.dataset.cardId),
                fromSection: card.dataset.section,
            };
            card.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', card.dataset.cardId);
        }

        // 拖拽结束时（包括取消、完成）清理样式
        document.addEventListener('dragend', function() {
            dragData = null;
            document.querySelectorAll('.deck-card.dragging').forEach(c => c.classList.remove('dragging'));
            document.querySelectorAll('.deck-col').forEach(c => c.classList.remove('drag-over'));
        });

        function onDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            const col = e.target.closest('.deck-col');
            if (col) col.classList.add('drag-over');
        }

        function onDragLeave(e) {
            const col = e.target.closest('.deck-col');
            if (col) col.classList.remove('drag-over');
        }

        function onDrop(e, toSection) {
            e.preventDefault();
            // 清除高亮
            document.querySelectorAll('.deck-col').forEach(c => c.classList.remove('drag-over'));
            // 清除拖拽中的样式
            document.querySelectorAll('.deck-card.dragging').forEach(c => c.classList.remove('dragging'));

            if (!dragData) return;
            const { cardId, fromSection } = dragData;
            dragData = null;

            if (fromSection === toSection) return;

            // 执行移动
            doMoveCard(cardId, fromSection, toSection);
        }

        // ── 移动卡牌 ──
        async function doMoveCard(cardId, fromSection, toSection) {
            try {
                const resp = await fetch('/api/move-card', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        card_id: cardId,
                        from_section: fromSection,
                        to_section: toSection
                    })
                });
                const data = await resp.json();
                if (data.error) {
                    showToast(data.error, 'error');
                    return;
                }
                showToast('已移至' + (toSection === 'main' ? '主卡组' : '副卡组'), 'success');
                // 刷新编辑器
                await loadDeckDetail();
            } catch(e) {
                showToast('移动失败: ' + e.message, 'error');
            }
        }

        // ── 重新分析 ──
        async function reanalyze() {
            const btn = document.getElementById('btnReanalyze');
            btn.disabled = true;
            btn.textContent = '⏳ 分析中...';

            try {
                const resp = await fetch('/api/reanalyze', { method: 'POST' });
                const data = await resp.json();
                if (data.error) {
                    showToast(data.error, 'error');
                    btn.disabled = false;
                    btn.textContent = '保存修改后重新分析';
                    return;
                }

                // 更新统计栏
                const bar = document.getElementById('statBar');
                bar.style.display = 'flex';
                bar.innerHTML = '';
                [
                    {num: data.main_count, label: '主卡组'},
                    {num: data.monster_count, label: '主卡组怪兽'},
                ].forEach(s => {
                    const d = document.createElement('div');
                    d.className = 'stat-item';
                    d.innerHTML = '<div class="num">' + s.num + '</div><div class="label">' + s.label + '</div>';
                    bar.appendChild(d);
                });

                // 渲染怪兽网格
                const grid = document.getElementById('monsterGrid');
                const section = document.getElementById('resultSection');
                const noMonsters = document.getElementById('noMonsters');

                grid.innerHTML = '';
                if (data.monsters.length === 0) {
                    section.style.display = 'none';
                    noMonsters.style.display = 'block';
                } else {
                    section.style.display = 'block';
                    noMonsters.style.display = 'none';
                    data.monsters.forEach(m => {
                        const div = document.createElement('div');
                        div.className = 'monster-card';
                        const imgSrc = m.has_pic ? '/api/tmpimg/' + m.id + '.jpg' : '/api/placeholder';
                        div.innerHTML = `
                            <img src="${imgSrc}" alt="${m.name}" loading="lazy">
                            <div class="badge">Lv${m.level}</div>
                            <div class="info">
                                <div class="name">${m.name}</div>
                                <div class="stats">ATK ${m.atk} / DEF ${m.def}</div>
                            </div>
                        `;
                        div.onclick = () => showChainGraph(m.id, m.name);
                        grid.appendChild(div);
                    });
                }

                showToast('分析完成！发现 ' + data.monster_count + ' 只怪兽', 'success');

                // 切换到分析 Tab
                switchTab('analysis');

            } catch(e) {
                showToast('分析失败: ' + e.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '保存修改后重新分析';
            }
        }

        // ── 检索关系图模态框 ──
        async function showChainGraph(cardId, cardName) {
            const overlay = document.getElementById('modalOverlay');
            const title = document.getElementById('modalTitle');
            const body = document.getElementById('modalBody');
            overlay.classList.add('visible');
            title.textContent = cardName + ' - 检索关系图';
            body.className = 'modal-loading';
            body.textContent = '正在生成检索关系图...';

            try {
                const resp = await fetch('/api/chain-graph/' + cardId);
                if (!resp.ok) {
                    body.textContent = '加载失败';
                    return;
                }
                const blob = await resp.blob();
                const url = URL.createObjectURL(blob);
                body.className = '';
                body.innerHTML = '<img src="' + url + '" alt="' + cardName + ' 检索关系图">';
            } catch(e) {
                body.textContent = '请求失败: ' + e.message;
            }
        }

        function closeModal(e) {
            if (e && e.target !== e.currentTarget) return;
            document.getElementById('modalOverlay').classList.remove('visible');
        }

        // ESC 关闭
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') document.getElementById('modalOverlay').classList.remove('visible');
        });

        // 关闭标签页时自动终止后端进程
        window.addEventListener('beforeunload', function() {
            navigator.sendBeacon('/api/shutdown', '');
        });

        loadDecks();
    </script>
</body>
</html>
